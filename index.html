<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEE'S ART</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#1f1f1f;color:#fff;overflow-x:hidden;}

/* HEADER */
header{
  background:#222;
  padding:15px;
  text-align:center;
  border-bottom:3px solid red;
}

.logo-container{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.logo-container img{width:60px;}
.logo-container h1{color:red;font-size:2.3rem;}

nav{margin-top:10px;}
nav a{margin:0 10px;color:white;text-decoration:none;}
nav a:hover{color:gold;}

/* HERO */
.hero{
  background:url('images/banner.jpg') center/cover no-repeat;
  height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero h2{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border:2px solid red;
}

/* SECTION */
.section-title{
  text-align:center;
  margin:40px 0 20px;
  color:#ff6347;
}

main{max-width:1000px;margin:auto;padding:20px;}

/* SLIDER */
.slider{overflow:hidden;position:relative;}
.slides{display:flex;transition:0.5s;}
.slide{min-width:100%;}
.slide img{width:100%;height:300px;object-fit:cover;}

button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:black;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}
.prev{left:10px;}
.next{right:10px;}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.gallery img{width:100%;cursor:pointer;}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
}
#lightbox.show{opacity:1;pointer-events:auto;}
#lightbox img{max-width:90%;}

/* FOOTER */
footer{text-align:center;padding:20px;border-top:2px solid red;}
</style>
</head>

<body>

<header>
  <div class="logo-container">
    <img src="images/logo.jpg">
    <h1>TEE'S ART</h1>
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#featured">Featured</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<div class="hero">
  <h2>Welcome to Tee Martires' Gallery</h2>
</div>

<main>

<h2 class="section-title" id="featured">Featured Art</h2>

<div class="slider">
  <div class="slides">
    <div class="slide"><img src="images/featured1.jpg"></div>
    <div class="slide"><img src="images/featured2.jpg"></div>
    <div class="slide"><img src="images/featured3.jpg"></div>
    <div class="slide"><img src="images/featured4.jpg"></div>
  </div>
  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<h2 class="section-title" id="gallery">Gallery</h2>

<div class="gallery">
  <img src="images/featured1.jpg">
  <img src="images/featured2.jpg">
  <img src="images/featured3.jpg">
  <img src="images/featured4.jpg">
</div>

</main>

<footer>
<p>© 2026 TEE'S ART</p>
</footer>

<div id="lightbox"><img src=""></div>

<script>
// SLIDER
const slides=document.querySelector('.slides');
const slide=document.querySelectorAll('.slide');
let i=0;

document.querySelector('.next').onclick=()=>{
  i=(i+1)%slide.length;
  slides.style.transform=`translateX(${-i*100}%)`;
}
document.querySelector('.prev').onclick=()=>{
  i=(i-1+slide.length)%slide.length;
  slides.style.transform=`translateX(${-i*100}%)`;
}

// LIGHTBOX
const images=document.querySelectorAll('.gallery img');
const lightbox=document.getElementById('lightbox');
const img=lightbox.querySelector('img');

images.forEach(image=>{
  image.onclick=()=>{
    img.src=image.src;
    lightbox.classList.add('show');
  }
});
lightbox.onclick=()=>lightbox.classList.remove('show');
</script>

</body>
</html>
